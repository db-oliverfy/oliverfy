<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1D9E75" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Oliverfy" />
  <title>Oliverfy — Controle Uber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;--green-deep:#085041;
      --red:#E24B4A;--red-light:#FCEBEB;--red-dark:#A32D2D;
      --blue:#378ADD;--blue-light:#E6F1FB;
      --amber:#EF9F27;--amber-light:#FAEEDA;--amber-dark:#633806;
      --purple:#7F77DD;--purple-light:#EEEDFE;
      --bg:#F5F4F0;--surface:#FFFFFF;--surface2:#F8F7F4;
      --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);
      --text:#1A1A18;--text2:#5F5E5A;--text3:#9A9892;
      --radius:10px;--radius-lg:14px;
      --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#0F0F0E;--surface:#1A1A18;--surface2:#222220;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
      --text:#F0EFE8;--text2:#A8A69E;--text3:#6A6860;
      --shadow:0 1px 3px rgba(0,0,0,0.3);
      --green-light:#0D3D2A;--red-light:#2D1414;--blue-light:#0D2340;
      --amber-light:#2D1F08;--purple-light:#1A1840;
    }}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

    /* LOGIN */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
    .login-box{width:100%;max-width:380px;}
    .login-logo{font-size:28px;font-weight:500;color:var(--text);margin-bottom:2rem;letter-spacing:-0.5px;text-align:center;}
    .login-logo em{color:var(--green);font-style:normal;}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.75rem;box-shadow:var(--shadow);}
    .login-card h2{font-size:16px;font-weight:500;color:var(--text);margin-bottom:1.5rem;text-align:center;}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
    .field label{font-size:12px;font-weight:500;color:var(--text2);}
    .field input{height:42px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border-color 0.15s;}
    .field input:focus{border-color:var(--green);}
    .field input::placeholder{color:var(--text3);}
    .btn-login{width:100%;height:42px;background:var(--green);color:white;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:6px;transition:background 0.15s;}
    .btn-login:hover{background:var(--green-dark);}
    .btn-login:disabled{opacity:0.6;cursor:not-allowed;}
    .login-error{font-size:12px;color:var(--red-dark);margin-top:10px;text-align:center;display:none;}

    /* APP */
    .app{display:none;flex-direction:column;min-height:100vh;}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .top-logo{font-size:18px;font-weight:500;color:var(--text);letter-spacing:-0.3px;}
    .top-logo em{color:var(--green);font-style:normal;}
    .topbar-right{display:flex;align-items:center;gap:10px;}
    .bot-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--green-light);border-radius:var(--radius);font-size:12px;font-weight:500;color:var(--green-dark);}
    .bot-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .user-badge{font-size:13px;font-weight:500;color:var(--text2);}
    .btn-refresh{height:34px;padding:0 12px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.15s;}
    .btn-refresh:hover{background:var(--surface2);}
    .btn-out{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px;}
    .btn-out:hover{color:var(--text2);}

    /* TABS */
    .nav-tabs{display:flex;gap:2px;background:var(--surface2);border-bottom:1px solid var(--border);padding:0 1.5rem;}
    .nav-tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s,border-color 0.15s;font-family:'DM Sans',sans-serif;}
    .nav-tab:hover{color:var(--text);}
    .nav-tab.active{color:var(--green);border-bottom-color:var(--green);}
    .page{display:none;}
    .page.active{display:block;}
    .content{padding:1.5rem;max-width:1280px;margin:0 auto;width:100%;}

    /* CARDS */
    .cards-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.25rem;}
    .metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;box-shadow:var(--shadow);}
    .accent{height:3px;border-radius:2px;margin-bottom:12px;}
    .metric-label{font-size:11px;font-weight:500;letter-spacing:0.04em;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
    .metric-val{font-size:22px;font-weight:500;color:var(--text);letter-spacing:-0.5px;}
    .metric-sub{font-size:12px;margin-top:4px;color:var(--text2);}

    /* CARD */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow);}
    .card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
    .card-title{font-size:13px;font-weight:500;color:var(--text);}
    .card-hint{font-size:11px;color:var(--text3);}

    /* BAR CHART */
    .bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px;}
    .bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;}
    .bar-col{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:opacity 0.2s;}
    .bar-col:hover{opacity:0.7;}
    .bar-lbl{font-size:10px;color:var(--text3);}

    /* MONTH GRID */
    .month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
    .month-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;box-shadow:var(--shadow);cursor:pointer;transition:border-color 0.15s;}
    .month-card:hover{border-color:var(--green);}
    .month-card.sel{border-color:var(--green);background:var(--green-light);}
    .month-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px;}
    .month-card.sel .month-name{color:var(--green-dark);}
    .month-stat{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:3px;}
    .month-stat strong{color:var(--text);font-weight:500;}
    .month-card.sel .month-stat{color:var(--green-dark);}
    .month-card.sel .month-stat strong{color:var(--green-deep);}

    /* REIMB */
    .reimb-card{background:var(--amber-light);border:1px solid rgba(239,159,39,0.3);border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow);margin-bottom:1.25rem;}
    .reimb-title{font-size:12px;font-weight:500;color:var(--amber-dark);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px;}
    .reimb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
    .reimb-item{background:var(--surface);border-radius:var(--radius);padding:10px 14px;border:1px solid var(--border);}
    .reimb-month{font-size:11px;color:var(--text3);margin-bottom:3px;}
    .reimb-val{font-size:18px;font-weight:500;color:var(--amber-dark);}

    /* TX LIST */
    .tx-list{display:flex;flex-direction:column;}
    .tx-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
    .tx-item:last-child{border-bottom:none;}
    .tx-icon{width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
    .tx-body{flex:1;min-width:0;}
    .tx-name{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .tx-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px;}
    .tx-right{text-align:right;flex-shrink:0;}
    .tx-amt{font-size:13px;font-weight:500;color:var(--red-dark);}
    .tx-reimb{font-size:11px;color:var(--amber-dark);margin-top:2px;}

    /* BADGES */
    .badge{display:inline-block;padding:1px 8px;border-radius:20px;font-size:10px;font-weight:500;}
    .badge-ida{background:var(--blue-light);color:var(--blue);}
    .badge-volta{background:var(--green-light);color:var(--green-dark);}
    .badge-outro{background:var(--surface2);color:var(--text3);}

    /* REGISTROS */
    .reg-filters{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;}
    .reg-filters select,.reg-filters input[type=text]{height:36px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;}
    .reg-filters select:focus,.reg-filters input:focus{border-color:var(--green);}
    .btn-clear{height:36px;padding:0 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.15s;}
    .btn-clear:hover{background:var(--surface2);}
    .reg-summary{display:flex;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;}
    .reg-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;font-size:13px;color:var(--text2);}
    .reg-stat strong{color:var(--text);font-weight:500;}
    .reg-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);}
    .reg-table{width:100%;border-collapse:collapse;font-size:13px;}
    .reg-table th{padding:10px 16px;text-align:left;font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
    .reg-table th:hover{color:var(--text2);}
    .reg-table th.sorted{color:var(--green);}
    .reg-table td{padding:10px 16px;border-bottom:1px solid var(--border);color:var(--text);}
    .reg-table tr:last-child td{border-bottom:none;}
    .reg-table tr:hover td{background:var(--surface2);}
    .c-red{color:var(--red-dark);font-weight:500;}
    .c-amb{color:var(--amber-dark);font-weight:500;}
    .empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px;}

    @media(max-width:900px){
      .cards-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
      .two-col{grid-template-columns:1fr!important;}
    }
    @media(max-width:560px){
      .cards-grid{grid-template-columns:1fr 1fr;}
      .content{padding:1rem;}
      .topbar{padding:0 1rem;}
      .top-logo{font-size:16px;}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">Oliver<em>fy</em></div>
    <div class="login-card">
      <h2>Entrar na sua conta</h2>
      <div class="field"><label>Usuário</label><input type="text" id="loginUser" placeholder="seu usuário" autocomplete="username" /></div>
      <div class="field"><label>Senha</label><input type="password" id="loginPass" placeholder="sua senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" /></div>
      <button class="btn-login" id="loginBtn" onclick="doLogin()">Entrar</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <header class="topbar">
    <div class="top-logo">Oliver<em>fy</em></div>
    <div class="topbar-right">
      <button class="btn-refresh" onclick="refreshData()">&#8635; Atualizar</button>
      <div class="bot-badge"><div class="bot-dot"></div>Conectado</div>
      <span class="user-badge" id="userBadge"></span>
      <button class="btn-out" onclick="doLogout()">Sair</button>
    </div>
  </header>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('dashboard',this)">Dashboard</button>
    <button class="nav-tab" onclick="switchPage('registros',this)">Registros</button>
  </nav>

  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
  <main class="content">
    <div class="cards-grid">
      <div class="metric-card">
        <div class="accent" style="background:var(--red)"></div>
        <div class="metric-label">Gasto este mes</div>
        <div class="metric-val" id="mMes">-</div>
        <div class="metric-sub" id="mMesSub"></div>
      </div>
      <div class="metric-card">
        <div class="accent" style="background:var(--blue)"></div>
        <div class="metric-label">Corridas este mes</div>
        <div class="metric-val" id="mCorridas">-</div>
        <div class="metric-sub" id="mCorridasSub"></div>
      </div>
      <div class="metric-card">
        <div class="accent" style="background:var(--purple)"></div>
        <div class="metric-label">Total geral</div>
        <div class="metric-val" id="mTotal">-</div>
        <div class="metric-sub" id="mTotalSub"></div>
      </div>
      <div class="metric-card">
        <div class="accent" style="background:var(--amber)"></div>
        <div class="metric-label">Reembolso Fernando</div>
        <div class="metric-val" id="mReimb">-</div>
        <div class="metric-sub" id="mReimbSub"></div>
      </div>
    </div>

    <div id="reimbCard" style="display:none" class="reimb-card">
      <div class="reimb-title">Reembolso por mes - Fernando</div>
      <div class="reimb-grid" id="reimbGrid"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.25rem" class="two-col">
      <div class="card">
        <div class="card-hd"><span class="card-title">Gasto por mes</span></div>
        <div class="bar-chart" id="barGasto"></div>
      </div>
      <div class="card">
        <div class="card-hd"><span class="card-title">Corridas por mes</span></div>
        <div class="bar-chart" id="barCorridas"></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:1.25rem">
      <div class="card-hd">
        <span class="card-title">Resumo por mes</span>
        <span class="card-hint">clique para filtrar</span>
      </div>
      <div class="month-grid" id="monthGrid"></div>
    </div>

    <div class="card">
      <div class="card-hd"><span class="card-title" id="recentTitle">Corridas recentes</span></div>
      <div class="tx-list" id="txList"></div>
    </div>
  </main>
  </div>

  <!-- REGISTROS -->
  <div class="page" id="page-registros">
  <main class="content">
    <div class="reg-filters">
      <select id="regMes" onchange="renderReg()"><option value="">Todos os meses</option></select>
      <select id="regTipo" onchange="renderReg()">
        <option value="">Ida e Volta</option>
        <option value="ida">Ida</option>
        <option value="volta">Volta</option>
        <option value="outro">Outros</option>
      </select>
      <input type="text" id="regBusca" placeholder="Buscar descricao..." oninput="renderReg()" style="min-width:180px" />
      <button class="btn-clear" onclick="clearReg()">Limpar</button>
    </div>
    <div class="reg-summary" id="regSum"></div>
    <div class="reg-table-wrap">
      <table class="reg-table">
        <thead><tr>
          <th onclick="sortReg('data')" id="th-data">Data</th>
          <th onclick="sortReg('desc')">Descricao</th>
          <th onclick="sortReg('tipo')">Tipo</th>
          <th onclick="sortReg('valor')" id="th-valor">Valor</th>
          <th onclick="sortReg('reimb')">Reimb. Fernando</th>
        </tr></thead>
        <tbody id="regBody"></tbody>
      </table>
    </div>
  </main>
  </div>
</div>

<script>
const USERS = [
  {
    user: 'Gustavo',
    pass: '12345678',
    name: 'Uber Gustavo',
    sheetUrl: 'https://script.google.com/macros/s/AKfycbwWO4pSHp5kTd7ld0sRZFrt1B--bT-QVyxXv8z5V7mbQ9EfiUNK0wKKcQffT6tBTh1dBw/exec',
    incomeUrl: 'https://script.google.com/macros/s/AKfycbwWO4pSHp5kTd7ld0sRZFrt1B--bT-QVyxXv8z5V7mbQ9EfiUNK0wKKcQffT6tBTh1dBw/exec'
  },
];

let allData=[], csvUrl='', currentUser=null, selectedMonth=null;
let regSort={col:'data',asc:false};

function parseDate(s){
  if(!s)return null;
  const p=s.trim().split(/[\/\-]/);
  if(p.length!==3)return null;
  const[a,b,c]=p;
  if(a.length===4)return new Date(+a,+b-1,+c);
  return new Date(+c<100?2000+(+c):(+c),+b-1,+a);
}

function cleanVal(v){
  if(!v)return 0;
  let s=v.replace(/[^0-9,.-]/g,'').trim();
  if(!s)return 0;
  if(/,\d{2}$/.test(s))s=s.replace(/\./g,'').replace(',','.');
  else if(/\.\d{2}$/.test(s))s=s.replace(/,/g,'');
  else s=s.replace(/[,.]/g,'');
  return parseFloat(s)||0;
}

function fmt(n){return'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}

function mkey(d){if(!d)return'';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}

function mlabel(k){
  if(!k)return'';
  const[y,m]=k.split('-');
  return new Date(+y,+m-1,1).toLocaleString('pt-BR',{month:'short',year:'2-digit'}).replace('.','');
}

function getTipo(desc){
  const d=(desc||'').toLowerCase();
  if(d.includes('ida'))return'ida';
  if(d.includes('volta'))return'volta';
  return'outro';
}

function parseLine(line){
  const cols=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
    else{cur+=ch;}
  }
  cols.push(cur.trim());
  return cols;
}

function parseCSV(text){
  const lines=text.trim().split('\n'),rows=[];
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();if(!line)continue;
    const cols=parseLine(line);
    while(cols.length>0&&cols[0]==='')cols.shift();
    if(cols.length<2)continue;
    const f=(cols[0]||'').toLowerCase();
    if(f==='data'||f==='date')continue;
    const data=cols[0]||'';
    const valor=cleanVal(cols[1]);
    const desc=(cols[2]||'').trim();
    const reimb=cleanVal(cols[3]||'0');
    const d=parseDate(data);
    if(data)rows.push({data,valor,desc,reimb,date:d,month:d?mkey(d):''});
  }
  return rows;
}

async function fetchCsv(url){
  const attempts=[
    ()=>fetch(url,{redirect:'follow',mode:'cors'}),
    ()=>fetch('https://corsproxy.io/?'+encodeURIComponent(url)),
    ()=>fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url)),
  ];
  for(const a of attempts){
    try{
      const res=await a();if(!res.ok)continue;
      const text=await res.text();
      const c=text.trim();
      if(c.length>5&&!c.startsWith('<')&&!c.startsWith('{'))return text;
    }catch(e){continue;}
  }
  throw new Error('Falha ao carregar');
}

function render(){
  const now=new Date();
  const curKey=mkey(now);
  const mesData=allData.filter(r=>r.month===curKey);

  // cards
  const totalMes=mesData.reduce((s,r)=>s+r.valor,0);
  const corridasMes=mesData.length;
  const totalGeral=allData.reduce((s,r)=>s+r.valor,0);
  const totalReimb=allData.reduce((s,r)=>s+r.reimb,0);
  const reimbMes=mesData.reduce((s,r)=>s+r.reimb,0);

  document.getElementById('mMes').textContent=fmt(totalMes);
  document.getElementById('mMesSub').textContent=corridasMes+' corridas';
  document.getElementById('mCorridas').textContent=corridasMes;
  document.getElementById('mCorridasSub').textContent='em '+now.toLocaleString('pt-BR',{month:'long'});
  document.getElementById('mTotal').textContent=fmt(totalGeral);
  document.getElementById('mTotalSub').textContent=allData.length+' corridas no total';
  document.getElementById('mReimb').textContent=fmt(totalReimb);
  document.getElementById('mReimbSub').textContent='mes atual: '+fmt(reimbMes);

  // months map
  const months={};
  allData.forEach(r=>{
    if(!r.month)return;
    if(!months[r.month])months[r.month]={total:0,corridas:0,reimb:0,ida:0,volta:0};
    months[r.month].total+=r.valor;
    months[r.month].corridas++;
    months[r.month].reimb+=r.reimb;
    const t=getTipo(r.desc);
    if(t==='ida')months[r.month].ida++;
    else if(t==='volta')months[r.month].volta++;
  });
  const mkeys=Object.keys(months).sort();

  // reembolso card
  const hasReimb=mkeys.some(k=>months[k].reimb>0);
  document.getElementById('reimbCard').style.display=hasReimb?'block':'none';
  if(hasReimb){
    document.getElementById('reimbGrid').innerHTML=mkeys.filter(k=>months[k].reimb>0).map(k=>
      '<div class="reimb-item"><div class="reimb-month">'+mlabel(k)+'</div><div class="reimb-val">'+fmt(months[k].reimb)+'</div></div>'
    ).join('');
  }

  // bar charts
  const recent=mkeys.slice(-7);
  const maxV=Math.max(...recent.map(k=>months[k].total),1);
  const maxC=Math.max(...recent.map(k=>months[k].corridas),1);
  document.getElementById('barGasto').innerHTML=recent.map(k=>{
    const h=Math.max(Math.round((months[k].total/maxV)*110),3);
    const cur=k===curKey;
    return '<div class="bar-group" onclick="selMonth(\''+ k +'\')">'+
      '<div class="bar-col" style="height:'+h+'px;background:'+( cur?'var(--red)':'var(--blue)')+';opacity:'+( selectedMonth===k?'1':'0.75')+'"></div>'+
      '<div class="bar-lbl">'+mlabel(k)+'</div></div>';
  }).join('');
  document.getElementById('barCorridas').innerHTML=recent.map(k=>{
    const h=Math.max(Math.round((months[k].corridas/maxC)*110),3);
    const cur=k===curKey;
    return '<div class="bar-group" onclick="selMonth(\''+ k +'\')">'+
      '<div class="bar-col" style="height:'+h+'px;background:'+( cur?'var(--purple)':'var(--green)')+';opacity:'+( selectedMonth===k?'1':'0.75')+'"></div>'+
      '<div class="bar-lbl">'+mlabel(k)+'</div></div>';
  }).join('');

  // month grid
  const mg=document.getElementById('monthGrid');
  mg.innerHTML='';
  if(!mkeys.length){mg.innerHTML='<div class="empty">Sem dados</div>';return;}
  [...mkeys].reverse().forEach(k=>{
    const m=months[k];const sel=selectedMonth===k;
    mg.innerHTML+='<div class="month-card'+(sel?' sel':'')+'" onclick="selMonth(\''+ k +'\')">'+
      '<div class="month-name">'+mlabel(k)+(k===curKey?' (atual)':'')+'</div>'+
      '<div class="month-stat"><span>Gasto</span><strong>'+fmt(m.total)+'</strong></div>'+
      '<div class="month-stat"><span>Corridas</span><strong>'+m.corridas+'</strong></div>'+
      '<div class="month-stat"><span>Ida</span><strong>'+m.ida+'</strong></div>'+
      '<div class="month-stat"><span>Volta</span><strong>'+m.volta+'</strong></div>'+
      (m.reimb>0?'<div class="month-stat"><span>Reimb.</span><strong style="color:var(--amber-dark)">'+fmt(m.reimb)+'</strong></div>':'')+
      '</div>';
  });

  // recent rides
  const showData=selectedMonth?allData.filter(r=>r.month===selectedMonth):mesData;
  document.getElementById('recentTitle').textContent=selectedMonth?'Corridas - '+mlabel(selectedMonth):'Corridas este mes';
  const sorted=[...showData].sort((a,b)=>(b.date||0)-(a.date||0)).slice(0,25);
  const tl=document.getElementById('txList');
  if(!sorted.length){tl.innerHTML='<div class="empty">Nenhuma corrida encontrada</div>';return;}
  tl.innerHTML=sorted.map(r=>{
    const tipo=getTipo(r.desc);
    const badge=tipo==='ida'?'<span class="badge badge-ida">Ida</span>':tipo==='volta'?'<span class="badge badge-volta">Volta</span>':'<span class="badge badge-outro">-</span>';
    return '<div class="tx-item">'+
      '<div class="tx-icon" style="background:'+( tipo==='ida'?'var(--blue-light)':'var(--green-light)')+'">🚗</div>'+
      '<div class="tx-body"><div class="tx-name">'+( r.desc||'')+'</div>'+
      '<div class="tx-meta">'+r.data+' '+badge+'</div></div>'+
      '<div class="tx-right"><div class="tx-amt">-'+fmt(r.valor)+'</div>'+
      (r.reimb>0?'<div class="tx-reimb">reimb. '+fmt(r.reimb)+'</div>':'')+
      '</div></div>';
  }).join('');
}

function selMonth(k){selectedMonth=selectedMonth===k?null:k;render();}

function renderReg(){
  const mesF=document.getElementById('regMes').value;
  const tipoF=document.getElementById('regTipo').value;
  const busca=(document.getElementById('regBusca').value||'').toLowerCase();

  let rows=[...allData];
  if(mesF)rows=rows.filter(r=>r.month===mesF);
  if(tipoF)rows=rows.filter(r=>getTipo(r.desc)===tipoF);
  if(busca)rows=rows.filter(r=>(r.desc||'').toLowerCase().includes(busca));

  rows.sort((a,b)=>{
    let va,vb;
    if(regSort.col==='data'){va=a.date||0;vb=b.date||0;}
    else if(regSort.col==='valor'){va=a.valor;vb=b.valor;}
    else if(regSort.col==='reimb'){va=a.reimb;vb=b.reimb;}
    else if(regSort.col==='tipo'){va=getTipo(a.desc);vb=getTipo(b.desc);}
    else{va=(a.desc||'').toLowerCase();vb=(b.desc||'').toLowerCase();}
    if(va<vb)return regSort.asc?-1:1;
    if(va>vb)return regSort.asc?1:-1;
    return 0;
  });

  // update month select
  const months=[...new Set(allData.map(r=>r.month).filter(Boolean))].sort().reverse();
  const sel=document.getElementById('regMes');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todos os meses</option>';
  months.forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=mlabel(k);sel.appendChild(o);});
  sel.value=cur;

  // summary
  const total=rows.reduce((s,r)=>s+r.valor,0);
  const reimb=rows.reduce((s,r)=>s+r.reimb,0);
  document.getElementById('regSum').innerHTML=
    '<div class="reg-stat">'+rows.length+' corridas</div>'+
    '<div class="reg-stat">Total: <strong>'+fmt(total)+'</strong></div>'+
    (reimb>0?'<div class="reg-stat">Reimb. Fernando: <strong style="color:var(--amber-dark)">'+fmt(reimb)+'</strong></div>':'')+'';

  const tbody=document.getElementById('regBody');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="5" class="empty">Nenhum registro encontrado</td></tr>';return;}
  const tbadge=t=>t==='ida'?'<span class="badge badge-ida">Ida</span>':t==='volta'?'<span class="badge badge-volta">Volta</span>':'<span class="badge badge-outro">-</span>';
  tbody.innerHTML=rows.map(r=>'<tr>'+
    '<td>'+r.data+'</td>'+
    '<td>'+( r.desc||'')+'</td>'+
    '<td>'+tbadge(getTipo(r.desc))+'</td>'+
    '<td class="c-red">-'+fmt(r.valor)+'</td>'+
    '<td class="'+( r.reimb>0?'c-amb':'')+'">'+( r.reimb>0?fmt(r.reimb):'')+'</td>'+
    '</tr>').join('');
}

function sortReg(col){
  if(regSort.col===col)regSort.asc=!regSort.asc;
  else{regSort.col=col;regSort.asc=col==='data'?false:true;}
  document.querySelectorAll('.reg-table th').forEach(t=>t.classList.remove('sorted'));
  const th=document.getElementById('th-'+col);if(th)th.classList.add('sorted');
  renderReg();
}

function clearReg(){
  document.getElementById('regMes').value='';
  document.getElementById('regTipo').value='';
  document.getElementById('regBusca').value='';
  renderReg();
}

function switchPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='registros')renderReg();
}

function showDashboard(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='flex';
  if(currentUser)document.getElementById('userBadge').textContent=currentUser.name;
  render();
}

async function loadUserSheet(user){
  currentUser=user;csvUrl=user.sheetUrl;
  try{
    const text=await fetchCsv(user.sheetUrl);
    allData=parseCSV(text);
    if(!allData.length)throw new Error('Sem dados na planilha');
    showDashboard();
    try{localStorage.setItem('oliverfy_session',user.user);}catch(e){}
  }catch(e){
    const err=document.getElementById('loginError');
    err.textContent='Erro ao carregar: '+(e.message||'tente novamente');
    err.style.display='block';
    document.getElementById('loginBtn').disabled=false;
    document.getElementById('loginBtn').textContent='Entrar';
  }
}

function doLogin(){
  const user=document.getElementById('loginUser').value.trim().toLowerCase();
  const pass=document.getElementById('loginPass').value;
  const err=document.getElementById('loginError');
  const btn=document.getElementById('loginBtn');
  err.style.display='none';
  const found=USERS.find(u=>u.user.toLowerCase()===user&&u.pass===pass);
  if(!found){err.textContent='Usuario ou senha incorretos.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Carregando...';
  loadUserSheet(found);
}

function doLogout(){
  currentUser=null;allData=[];csvUrl='';selectedMonth=null;
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginBtn').disabled=false;
  document.getElementById('loginBtn').textContent='Entrar';
  try{localStorage.removeItem('oliverfy_session');}catch(e){}
}

async function refreshData(){
  if(!csvUrl)return;
  try{
    const text=await fetchCsv(csvUrl+'&t='+Date.now());
    allData=parseCSV(text);render();
  }catch(e){console.warn(e);}
}

window.addEventListener('DOMContentLoaded',()=>{
  try{
    const saved=localStorage.getItem('oliverfy_session');
    if(saved){
      const found=USERS.find(u=>u.user===saved);
      if(found){
        document.getElementById('loginBtn').disabled=true;
        document.getElementById('loginBtn').textContent='Carregando...';
        loadUserSheet(found);
      }
    }
  }catch(e){}
});
</script>
</body>
</html>
